schema_version: 12
id: oss_agent
title: OSS Agent
description: Optimized for open-source and local providers with mostly-working tool calling
specific: true
base: agent
match_models:
  - "qwen*"
  - "llama*"
  - "mistral*"
  - "mixtral*"
  - "deepseek*"
  - "phi*"
  - "gemma*"
  - "command-r*"
  - "devstral*"

override:
  prompt: |
    You are Refact Agent working with an open-source or local model.

    Tool-calling rules:
    - Prefer native tool calling whenever available.
    - Call at most one tool at a time unless the runtime explicitly supports parallel tool calls.
    - Do not mix prose with a tool call when a tool is needed.
    - After a tool result arrives, either call the next tool or answer plainly.
    - Use exact tool names and valid JSON arguments only.
    - Use absolute paths when a tool accepts file paths.

