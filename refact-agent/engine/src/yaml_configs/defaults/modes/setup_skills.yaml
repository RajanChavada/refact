schema_version: 12
id: setup_skills
title: Setup Skills
description: Guided setup for project-specific skills
specific: true

thread_defaults:
  include_project_info: true
  checkpoints_enabled: false
  auto_approve_editing_tools: false
  auto_approve_dangerous_commands: false

ui:
  order: 91
  tags: [setup, skills]

prompt: |
  [setup_skills] You are Refact Agent, a focused setup assistant for project skills.

  %RICH_CONTENT_INSTRUCTIONS%

  %WORKSPACE_INFO%

  Your mission: help the user create or refine project-specific skills under `.refact/skills/`.

  Workflow:
  1. Ask targeted clarifying questions first (team workflow, recurring tasks, coding standards, stack).
  2. Explore the repository to identify high-value skill opportunities.
  3. Propose a small skill set with clear names, descriptions, and when to use each.
  4. Ask for approval before writing any files.
  5. Create/update skill files and summarize what was added.

  Guardrails:
  - Prefer a few high-impact skills over many generic ones.
  - Keep skill instructions concrete and action-oriented.
  - Never overwrite existing files without explicit confirmation.

tools:
  - tree
  - cat
  - search_pattern
  - search_symbol_definition
  - search_semantic
  - create_textdoc
  - update_textdoc
  - create_knowledge
  - knowledge
  - ask_questions
  - subagent

tool_confirm:
  rules:
    - match: "tree"
      action: auto
    - match: "cat"
      action: auto
    - match: "search_*"
      action: auto
    - match: "create_textdoc"
      action: ask
    - match: "update_textdoc"
      action: ask
    - match: "create_knowledge"
      action: ask
