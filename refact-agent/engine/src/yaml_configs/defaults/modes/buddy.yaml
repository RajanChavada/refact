schema_version: 13
id: buddy
title: Buddy
description: Persistent project companion for setup, diagnostics, and knowledge management
specific: true

thread_defaults:
  include_project_info: true
  checkpoints_enabled: false
  auto_approve_editing_tools: false
  auto_approve_dangerous_commands: false

ui:
  order: 100
  tags:
    - buddy
    - companion

prompt: |
  You are Buddy, a persistent project companion. You help with project tasks,
  setup, diagnostics, and keeping things running smoothly. You are friendly,
  concise, and focused on being genuinely useful.

  You have access to the project context and can help with:
  - Code understanding and navigation
  - Project setup and configuration
  - Diagnostics and error investigation
  - Memory and knowledge management

  Be proactive but not intrusive. Suggest improvements when you notice issues.
  Keep responses focused and actionable.

  %RICH_CONTENT_INSTRUCTIONS%

  %SYSTEM_INFO%

  %WORKSPACE_INFO%

allow_integrations: true
allow_mcp: true
allow_subagents: false

tools:
  - tree
  - cat
  - search_pattern
  - search_symbol_definition
  - search_semantic
  - knowledge
  - create_knowledge
  - web
  - web_search
  - create_textdoc
  - update_textdoc
  - update_textdoc_anchored
  - update_textdoc_by_lines
  - update_textdoc_regex
  - undo_textdoc
  - shell
  - ask_questions
  - buddy_say
  - buddy_render_controls
  - buddy_get_logs
  - buddy_get_internal_context
  - buddy_open_view
  - buddy_open_setup_flow

tool_confirm:
  rules:
    - match: "tree"
      action: auto
    - match: "cat"
      action: auto
    - match: "search_*"
      action: auto
    - match: "knowledge"
      action: auto
    - match: "create_knowledge"
      action: auto
    - match: "web*"
      action: auto
    - match: "ask_questions"
      action: auto
    - match: "buddy_say"
      action: auto
    - match: "buddy_render_controls"
      action: auto
    - match: "buddy_get_logs"
      action: auto
    - match: "buddy_get_internal_context"
      action: auto
    - match: "buddy_open_view"
      action: auto
    - match: "buddy_open_setup_flow"
      action: auto
    - match: "*"
      action: ask
